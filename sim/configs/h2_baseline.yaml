# H2 baseline sweep — convergence under mixed agent populations
# Hypothesis: LS-LMSR converges to true probability within bounded trades
# regardless of starting prior, when credentialed agents are present.

name: h2_baseline
hypothesis: H2

# convergence criterion
convergence:
  epsilon: 0.03
  k: 50

# market parameters (held constant across sweep)
market:
  alpha: 0.05
  q_abmm_yes: 500.0
  q_abmm_no: 500.0

# ABMM retreat (disabled for H2 baseline — testing pure convergence)
abmm:
  enabled: false

# simulation parameters
n_trades: 1500
n_seeds: 20

# parameter grid (cartesian product)
sweep:
  agent_mix:
    # (% credentialed, % noise, % momentum) — must sum to 1.0
    - [0.6, 0.2, 0.2]
    - [0.4, 0.4, 0.2]
    - [0.2, 0.6, 0.2]
    - [0.5, 0.3, 0.2]
    - [0.1, 0.8, 0.1]
  starting_prior:
    # initial price_yes (we re-seed the market to achieve this)
    - 0.10
    - 0.30
    - 0.50
    - 0.70
    - 0.90
  true_probability:
    - 0.20
    - 0.50
    - 0.80

# agent parameters (held constant within sweep)
agents:
  total_agents: 50
  credentialed:
    sigma: 0.10
    aggressiveness: 0.1
    min_edge: 0.01
  noise:
    mean_size: 3.0
    size_std: 1.0
  momentum:
    lookback: 15
    threshold: 0.02
    aggressiveness: 0.06